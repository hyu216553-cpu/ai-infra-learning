<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Infra 学习系统 - 腾讯高招HR专业版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1200px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        /* 首页样式 */
        .home-screen {
            text-align: center;
        }
        
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .feature-card {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .feature-card .icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .feature-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        /* 知识库样式 */
        .knowledge-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            padding: 10px 20px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .knowledge-content {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            max-height: 600px;
            overflow-y: auto;
            line-height: 1.8;
        }
        
        .knowledge-content h2 {
            color: #667eea;
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        
        .knowledge-content h3 {
            color: #764ba2;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        
        .knowledge-content code {
            background: #282c34;
            color: #61dafb;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "Monaco", monospace;
        }
        
        .knowledge-content pre {
            background: #282c34;
            color: #abb2bf;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 15px 0;
        }
        
        .knowledge-content ul {
            margin-left: 30px;
            margin-bottom: 15px;
        }
        
        .knowledge-content li {
            margin-bottom: 8px;
        }
        
        .highlight {
            background: #fff3cd;
            padding: 2px 5px;
            border-radius: 3px;
        }
        
        /* 测验配置样式 */
        .quiz-config {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .config-group {
            margin-bottom: 30px;
        }
        
        .config-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 5px;
            background: #e9ecef;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }
        
        .slider-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            min-width: 50px;
        }
        
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        /* 测验界面样式 */
        .quiz-progress {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .progress-bar {
            flex: 1;
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
            margin: 0 20px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        
        .question-card {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .question-number {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .question-type {
            padding: 5px 15px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .question-text {
            font-size: 1.3em;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .option {
            background: white;
            padding: 20px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .option:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .option.selected {
            border-color: #667eea;
            background: #f0f3ff;
        }
        
        .option.correct {
            border-color: #28a745;
            background: #d4edda;
        }
        
        .option.wrong {
            border-color: #dc3545;
            background: #f8d7da;
        }
        
        .option-letter {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .option.correct .option-letter {
            background: #28a745;
        }
        
        .option.wrong .option-letter {
            background: #dc3545;
        }
        
        .quiz-actions {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        
        /* 结果页面样式 */
        .result-container {
            text-align: center;
        }
        
        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 40px auto;
            font-size: 3em;
            font-weight: bold;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
        }
        
        .score-label {
            font-size: 0.3em;
            margin-top: 10px;
        }
        
        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        
        .review-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-top: 40px;
            text-align: left;
        }
        
        .review-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #dc3545;
        }
        
        .review-item.correct {
            border-left-color: #28a745;
        }
        
        /* 隐藏类 */
        .hidden {
            display: none !important;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .feature-grid {
                grid-template-columns: 1fr;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 AI Infra 学习系统</h1>
            <p>腾讯高招HR专业版 - 深度学习AI基础设施知识</p>
        </div>
        
        <div class="content">
            <!-- 首页 -->
            <div id="homeScreen" class="home-screen">
                <div class="feature-grid">
                    <div class="feature-card" onclick="showKnowledge()">
                        <div class="icon">📚</div>
                        <h3>知识库学习</h3>
                        <p>深度学习分布式训练、推理优化、GPU集群等核心知识</p>
                    </div>
                    <div class="feature-card" onclick="showQuizConfig()">
                        <div class="icon">✍️</div>
                        <h3>智能测验</h3>
                        <p>自定义题量、难度和模块,测试你的理解程度</p>
                    </div>
                    <div class="feature-card" onclick="showStats()">
                        <div class="icon">📊</div>
                        <h3>学习统计</h3>
                        <p>查看学习进度和历史成绩</p>
                    </div>
                </div>
            </div>
            
            <!-- 知识库界面 -->
            <div id="knowledgeScreen" class="hidden">
                <div class="knowledge-nav" id="knowledgeNav"></div>
                <div class="knowledge-content" id="knowledgeContent"></div>
                <button class="btn btn-secondary" onclick="showHome()">返回首页</button>
            </div>
            
            <!-- 测验配置界面 -->
            <div id="quizConfigScreen" class="hidden">
                <div class="quiz-config">
                    <h2 style="text-align: center; margin-bottom: 30px;">配置你的测验</h2>
                    
                    <div class="config-group">
                        <label>题目数量: </label>
                        <div class="slider-container">
                            <input type="range" id="questionCount" min="10" max="50" value="20" oninput="updateSliderValue(this)">
                            <span class="slider-value" id="questionCountValue">20</span>
                        </div>
                    </div>
                    
                    <div class="config-group">
                        <label>选择模块:</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input type="checkbox" id="module-train" value="train" checked>
                                <label for="module-train">分布式训练</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="module-inference" value="inference" checked>
                                <label for="module-inference">推理优化</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="module-network" value="network" checked>
                                <label for="module-network">GPU集群网络</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="config-group">
                        <label>难度选择:</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input type="checkbox" id="diff-medium" value="medium" checked>
                                <label for="diff-medium">中级</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="diff-advanced" value="advanced" checked>
                                <label for="diff-advanced">高级</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="diff-expert" value="expert">
                                <label for="diff-expert">专家</label>
                            </div>
                        </div>
                    </div>
                    
                    <div style="text-align: center; margin-top: 40px;">
                        <button class="btn" onclick="startQuiz()">开始测验</button>
                        <button class="btn btn-secondary" onclick="showHome()">返回首页</button>
                    </div>
                </div>
            </div>
            
            <!-- 测验界面 -->
            <div id="quizScreen" class="hidden">
                <div class="quiz-progress">
                    <span>进度</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                    <span id="progressText">0/20</span>
                </div>
                
                <div class="question-card" id="questionCard"></div>
                
                <div class="quiz-actions">
                    <button class="btn btn-secondary" onclick="prevQuestion()">上一题</button>
                    <button class="btn" id="nextBtn" onclick="nextQuestion()">下一题</button>
                </div>
            </div>
            
            <!-- 结果界面 -->
            <div id="resultScreen" class="hidden">
                <div class="result-container">
                    <h2>测验完成!</h2>
                    <div class="score-circle">
                        <div id="finalScore">0</div>
                        <div class="score-label">分</div>
                    </div>
                    
                    <div class="result-stats">
                        <div class="stat-card">
                            <div class="stat-value" id="correctCount">0</div>
                            <div class="stat-label">答对题数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="wrongCount">0</div>
                            <div class="stat-label">答错题数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="accuracyRate">0%</div>
                            <div class="stat-label">正确率</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="timeSpent">0分钟</div>
                            <div class="stat-label">用时</div>
                        </div>
                    </div>
                    
                    <div class="review-section" id="reviewSection"></div>
                    
                    <div style="text-align: center; margin-top: 30px;">
                        <button class="btn" onclick="showQuizConfig()">再来一次</button>
                        <button class="btn btn-secondary" onclick="showHome()">返回首页</button>
                    </div>
                </div>
            </div>
            
            <!-- 统计界面 -->
            <div id="statsScreen" class="hidden">
                <h2>学习统计</h2>
                <p>功能开发中...</p>
                <button class="btn btn-secondary" onclick="showHome()">返回首页</button>
            </div>
        </div>
    </div>
    
    <script src="knowledge.js"></script>
    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
